<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Base Terminal | v2.3 SECURE</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding-top: 30px; }
        .terminal { border: 2px solid #00ff00; background: #000; padding: 30px; margin: 20px auto; width: 450px; box-shadow: 0 0 20px #00ff0033; }
        .data-line { display: flex; justify-content: space-between; margin: 15px 0; border-bottom: 1px solid #004400; padding-bottom: 5px; }
        .profit { font-size: 2.5rem; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #00ff00; }
        button { width: 100%; padding: 15px; margin: 5px 0; font-weight: bold; cursor: pointer; font-family: 'Courier New'; transition: 0.3s; }
        #strike-btn { background: #111; color: #333; border: 1px solid #333; }
        #strike-btn.active { background: #00ff00; color: #000; border: none; cursor: pointer; box-shadow: 0 0 15px #00ff00; }
        #sync-btn { background: #004400; color: #00ff00; border: 1px solid #00ff00; font-size: 0.7rem; }
        #status { font-size: 0.7rem; color: #888; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="terminal">
        <h2 style="margin-top:0;">BASE_CORE_OS v2.3</h2>
        <div class="data-line"><span>UNI_V3_PRICE:</span> <span id="uni-val">...</span></div>
        <div class="data-line"><span>AERO_PRICE:</span> <span id="aero-val">...</span></div>
        <div id="spread" class="profit">$0.00</div>
        
        <button id="strike-btn" disabled>SECURE_BOOT...</button>
        <button id="sync-btn">MANUAL_FORCE_SYNC</button>
        
        <p id="status">INITIALIZING_CORE...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <script>
        // 1. INFRASTRUCTURE - Using Base Mainnet RPC
        const RPC = "https://mainnet.base.org";
        const provider = new ethers.providers.JsonRpcProvider(RPC);

        // 2. NORMALIZED ADDRESSES (Fixed: All lowercase to prevent Checksum Error)
        const WETH = "0x4200000000000000000000000000000000000006".toLowerCase();
        const USDC = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913".toLowerCase();
        const UNI_POOL = "0xd0b53D9277642d2a2b174886eba035501dc1D19e".toLowerCase(); 
        const AERO_ROUTER = "0xcF77a3Ba9A5ca399AF7367531ED00Ba853860D98".toLowerCase();
        const CONTRACT_ADDR = "0xa94f006639da96911B042ef9461F08Bae58e9bA4".toLowerCase();

        let updateTimer;

        // 3. SECURE UPDATE LOGIC
        async function update() {
            // Clear any existing timers to prevent "race condition" loops
            clearTimeout(updateTimer);

            try {
                document.getElementById("status").innerText = "CORE_SYNC_ACTIVE...";
                
                // Uniswap V3 Price Logic (Using BigInt for precision)
                const pool = new ethers.Contract(UNI_POOL, ["function slot0() view returns (uint160, int24, uint16, uint16, uint16, uint8, bool)"], provider);
                const poolData = await pool.slot0();
                
                // Square root price calculation
                const sqrtPriceX96 = BigInt(poolData[0]);
                const ratio = sqrtPriceX96 * sqrtPriceX96;
                const shift = BigInt(2)**BigInt(192);
                const uPrice = (Number(ratio * BigInt(1e12) / shift) / 1e6).toFixed(2);
                document.getElementById("uni-val").innerText = "$" + uPrice;

                // Aerodrome Price Logic
                const router = new ethers.Contract(AERO_ROUTER, ["function getAmountOut(uint, address, address) view returns (uint, bool)"], provider);
                const aeroData = await router.getAmountOut(ethers.utils.parseEther("1"), WETH, USDC);
                const aPrice = (Number(aeroData[0]) / 1e6).toFixed(2);
                document.getElementById("aero-val").innerText = "$" + aPrice;

                // Calculate Spread
                const diff = (parseFloat(aPrice) - parseFloat(uPrice)).toFixed(2);
                const spreadEl = document.getElementById("spread");
                spreadEl.innerText = (diff > 0 ? "+" : "") + "$" + diff;
                spreadEl.style.color = diff > 0 ? "#00ff00" : "#ff3333";
                
                // Activate Strike Button
                const btn = document.getElementById("strike-btn");
                btn.innerText = "STRIKE_SIGNAL_READY";
                btn.disabled = false;
                btn.classList.add("active");
                document.getElementById("status").innerText = "STATUS_SECURE_ONLINE";

            } catch (err) {
                console.error("SYNC_ERROR:", err);
                document.getElementById("status").innerText = "RPC_RETRY_PENDING...";
            }
            
            // 4. CSP-SAFE RECURSION
            // Passing the function reference 'update' directly (NO QUOTES)
            updateTimer = setTimeout(update, 10000); 
        }

        async function strike() {
            if (!window.ethereum) return alert("MetaMask Missing!");
            
            try {
                const wallet = new ethers.providers.Web3Provider(window.ethereum);
                await wallet.send("eth_requestAccounts", []);
                const signer = wallet.getSigner();
                
                const bot = new ethers.Contract(CONTRACT_ADDR, ["function strike(uint256) external"], signer);
                
                document.getElementById("status").innerText = "AUTHORIZING_TX...";
                const tx = await bot.strike(ethers.utils.parseEther("0.01"), { gasLimit: 300000 });
                
                document.getElementById("status").innerText = "TX_PENDING_ON_CHAIN...";
                await tx.wait();
                document.getElementById("status").innerText = "STRIKE_SUCCESSFUL";
            } catch (e) { 
                console.error(e);
                document.getElementById("status").innerText = "TX_REJECTED_OR_FAILED"; 
            }
        }

        // Event Listeners
        document.getElementById("sync-btn").addEventListener("click", () => {
            update(); // Manual trigger
        });
        
        document.getElementById("strike-btn").addEventListener("click", strike);
        
        // Initial Boot
        window.addEventListener('load', update);
    </script>
</body>
</html>
