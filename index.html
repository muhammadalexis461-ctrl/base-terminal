<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Base Terminal | Verified v1.4</title>
    <style>
        body { background: #050505; color: #f0f0f0; font-family: 'Courier New', monospace; text-align: center; padding-top: 40px; }
        .card { border: 2px solid #333; background: #111; padding: 40px; margin: 20px auto; width: 420px; border-radius: 8px; }
        .price-box { font-size: 1.2rem; margin: 20px 0; display: flex; justify-content: space-between; border-bottom: 1px dashed #333; }
        .profit { color: #00ff00; font-size: 2.2rem; margin: 20px 0; text-shadow: 0 0 10px #00ff0055; }
        #strike-btn { width: 100%; padding: 20px; font-weight: bold; background: #222; color: #444; border: 1px solid #444; cursor: not-allowed; transition: 0.3s; }
        #strike-btn.ready { background: #0084ff; color: #fff; border: none; cursor: pointer; box-shadow: 0 0 20px #0084ff88; }
        #status { font-size: 0.7rem; color: #666; margin-top: 30px; letter-spacing: 2px; }
        .red { color: #ff4d4d; }
    </style>
</head>
<body>

    <h2 style="letter-spacing: 5px;">BASE_SCANNER_V1.4</h2>
    
    <div class="card">
        <div class="price-box"><span>UNISWAP_V3:</span> <span id="uni-val">0.00</span></div>
        <div class="price-box"><span>AERODROME:</span> <span id="aero-val">0.00</span></div>
        <div id="spread" class="profit">$0.00</div>
        <button id="strike-btn">SCANNING POOLS...</button>
    </div>
    
    <p id="status">CONNECTING TO INFURA_NODE_2FFB...</p>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <script>
        const INFURA_KEY = "3d49ad2c13ce4fd4bf1e847aa7302ffb";
        const RPC = `https://base-mainnet.infura.io/v3/${INFURA_KEY}`;
        
        // VERIFIED BASE ADDRESSES (APRIL 2026)
        const WETH = "0x4200000000000000000000000000000000000006";
        const USDC = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913";
        const UNI_POOL = "0xd0b53d9277642d899df5c87a3966a349a798f224"; // WETH/USDC 0.05%
        const AERO_ROUTER = "0xcF77a3Ba9A5CA399B7c97c74d54e5b1Beb874E43";
        const MY_CONTRACT = "0xa94f006639da96911B042ef9461F08Bae58e9bA4";

        const provider = new ethers.providers.StaticJsonRpcProvider(RPC);

        async function scan() {
            try {
                // 1. Uniswap Price
                const pool = new ethers.Contract(UNI_POOL, ["function slot0() view returns (uint160, int24, uint16, uint16, uint16, uint8, bool)"], provider);
                const [sqrtPrice] = await pool.slot0();
                const uPrice = (Math.pow(sqrtPrice / Math.pow(2, 96), 2) * 1e12).toFixed(2);
                document.getElementById("uni-val").innerText = `$${uPrice}`;

                // 2. Aerodrome Price
                const router = new ethers.Contract(AERO_ROUTER, ["function getAmountOut(uint, address, address) view returns (uint, bool)"], provider);
                const [amountOut] = await router.getAmountOut(ethers.utils.parseEther("1"), WETH, USDC);
                const aPrice = ethers.utils.formatUnits(amountOut, 6);
                document.getElementById("aero-val").innerText = `$${parseFloat(aPrice).toFixed(2)}`;

                // 3. UI Logic
                const diff = (aPrice - uPrice).toFixed(2);
                const spreadEl = document.getElementById("spread");
                const btn = document.getElementById("strike-btn");

                spreadEl.innerText = (diff > 0 ? "+" : "") + "$" + diff;
                
                if (Math.abs(diff) > 0.1) {
                    btn.innerText = "EXECUTE ARBITRAGE";
                    btn.classList.add("ready");
                    document.getElementById("status").innerText = "STATUS: SIGNAL_LOCKED";
                }
            } catch (err) {
                console.error(err);
                document.getElementById("status").innerHTML = '<span class="red">NODE ERROR: CHECK INFURA DASHBOARD</span>';
            }
        }

        async function strike() {
            if (!window.ethereum) return alert("MetaMask Missing!");
            const wallet = new ethers.providers.Web3Provider(window.ethereum);
            await wallet.send("eth_requestAccounts", []);
            const signer = wallet.getSigner();
            const contract = new ethers.Contract(MY_CONTRACT, ["function strike(uint256) external"], signer);
            
            try {
                document.getElementById("status").innerText = "AWAITING_WALLET_APPROVAL...";
                const tx = await contract.strike(ethers.utils.parseEther("0.01"));
                document.getElementById("status").innerText = "TRANSACTION_SENT...";
                await tx.wait();
                document.getElementById("status").innerText = "STRIKE_COMPLETE";
            } catch (e) {
                document.getElementById("status").innerText = "STRIKE_FAILED";
            }
        }

        document.getElementById("strike-btn").addEventListener("click", strike);
        setInterval(scan, 4000); // 4-second refresh
        scan();
    </script>
</body>
</html>
