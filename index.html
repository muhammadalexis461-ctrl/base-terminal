<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELB 461 | CSP-HARDENED v3.2</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding-top: 30px; }
        .terminal { border: 2px solid #00ff00; background: #000; padding: 30px; margin: 20px auto; width: 480px; box-shadow: 0 0 20px #00ff00; box-sizing: border-box; }
        .data-line { display: flex; justify-content: space-between; margin: 15px 0; border-bottom: 1px solid #004400; padding-bottom: 5px; }
        .profit { font-size: 2.5rem; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #00ff00; }
        #status { font-size: 0.8rem; color: #ff00ff; margin-top: 20px; text-transform: uppercase; font-weight: bold; }
        .log-box { height: 120px; background: #111; border: 1px solid #333; overflow-y: scroll; font-size: 0.7rem; text-align: left; padding: 10px; margin-top: 10px; color: #00ff00; }
    </style>
</head>
<body>
    <div class="terminal">
        <h2 style="margin:0;">ELB_461_SECURE_CORE</h2>
        <div class="data-line"><span>UNISWAP_V3 (0.05%):</span> <span id="uni-005">...</span></div>
        <div class="data-line"><span>UNISWAP_V3 (0.3%):</span>  <span id="uni-03">...</span></div>
        <div id="spread" class="profit">$0.00</div>
        <div id="status">INITIALIZING_SANDBOX...</div>
        <div class="log-box" id="logs">CSP_POLICY_ENFORCED...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>

    <script>
        const CONFIG = {
            RPCs: [
                "https://mainnet.base.org",
                "https://base.llamarpc.com",
                "https://base-rpc.publicnode.com",
                "https://1rpc.io/base",
                "https://base.meowrpc.com"
            ],
            // Uniswap V3 WETH/USDC 0.05% pool on Base (correct EIP-55 checksum)
            UNI_POOL_005: "0xd0b53D9277642d899DF5C87A3966A349A798F224",
            // Uniswap V3 WETH/USDC 0.3% pool on Base (correct EIP-55 checksum)
            UNI_POOL_03:  "0x6c561B446416E1A00E8E93E221854d6eA4171372",
            WETH: "0x4200000000000000000000000000000000000006",
            USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
            BOT:  "0xa94f006639da96911B042ef9461F08Bae58e9bA4"
        };

        const SLOT0_ABI = [
            "function slot0() view returns (uint160 sqrtPriceX96, int24 tick, uint16, uint16, uint16, uint8, bool)"
        ];

        let currentRpc = 0;

        function log(m) {
            const b = document.getElementById("logs");
            b.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        // Correct Uniswap V3 price formula: (sqrtPriceX96 / 2^96)^2 * 1e12
        // WETH (18 dec) is token0, USDC (6 dec) is token1 → multiply by 10^(18-6) = 1e12
        function calcPrice(sqrtPriceX96) {
            const Q96 = Number(2n ** 96n);
            const sqrtPrice = Number(sqrtPriceX96) / Q96;
            return sqrtPrice * sqrtPrice * 1e12;
        }

        async function getProvider() {
            for (let i = 0; i < CONFIG.RPCs.length; i++) {
                const idx = (currentRpc + i) % CONFIG.RPCs.length;
                const url = CONFIG.RPCs[idx];
                try {
                    const p = new ethers.JsonRpcProvider(url, undefined, { staticNetwork: true });
                    const block = await Promise.race([
                        p.getBlockNumber(),
                        new Promise((_, r) => setTimeout(() => r(new Error("timeout")), 5000))
                    ]);
                    if (block > 0) {
                        currentRpc = idx;
                        log("RPC_CONNECTED: " + url.split("/")[2]);
                        return p;
                    }
                } catch {
                    log("RPC_FAIL: " + url.split("/")[2] + " — rotating");
                    currentRpc = (idx + 1) % CONFIG.RPCs.length;
                }
            }
            log("ALL_RPC_FAILED: retrying");
            return null;
        }

        async function strike(diff) {
            if (!window.ethereum) return log("METAMASK_NOT_FOUND");
            try {
                const p = new ethers.BrowserProvider(window.ethereum);
                const s = await p.getSigner();
                const c = new ethers.Contract(CONFIG.BOT, ["function strike(uint256) external"], s);
                const tx = await c.strike(ethers.parseEther("0.01"), { gasLimit: 1000000 });
                log("STRIKE_SENT: " + tx.hash.slice(0, 10) + " diff=$" + diff.toFixed(2));
                await tx.wait();
                log("STRIKE_SUCCESS");
            } catch (e) {
                log("STRIKE_ABORTED: " + e.message.slice(0, 50));
            }
        }

        async function start() {
            log("BOOTING_ELB_461_SYSTEM");
            document.getElementById("status").innerText = "CONNECTING_TO_BASE...";

            while (true) {
                const provider = await getProvider();
                if (!provider) {
                    await new Promise(r => setTimeout(r, 8000));
                    continue;
                }

                try {
                    const pool005 = new ethers.Contract(CONFIG.UNI_POOL_005, SLOT0_ABI, provider);
                    const pool03  = new ethers.Contract(CONFIG.UNI_POOL_03,  SLOT0_ABI, provider);

                    const [s1, s2] = await Promise.all([pool005.slot0(), pool03.slot0()]);

                    const price005 = calcPrice(s1.sqrtPriceX96);
                    const price03  = calcPrice(s2.sqrtPriceX96);
                    const diff = price03 - price005;

                    document.getElementById("uni-005").innerText = "$" + price005.toFixed(2);
                    document.getElementById("uni-03").innerText  = "$" + price03.toFixed(2);
                    document.getElementById("spread").innerText  =
                        (diff >= 0 ? "+" : "-") + "$" + Math.abs(diff).toFixed(2);
                    document.getElementById("status").innerText = "ELB_SCANNER_LIVE";

                    if (Math.abs(diff) > 0.50) await strike(diff);

                } catch (e) {
                    currentRpc = (currentRpc + 1) % CONFIG.RPCs.length;
                    log("QUERY_ERROR: " + e.message.slice(0, 60) + " — rotating RPC");
                    document.getElementById("status").innerText = "RPC_ROTATING...";
                }

                await new Promise(r => setTimeout(r, 4000));
            }
        }

        window.addEventListener('load', start);
    </script>
</body>
</html>
