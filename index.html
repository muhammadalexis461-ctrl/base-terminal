<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Base Terminal | v2.2 BYPASS</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding-top: 30px; }
        .terminal { border: 2px solid #00ff00; background: #000; padding: 30px; margin: 20px auto; width: 450px; box-shadow: 0 0 20px #00ff0033; }
        .data-line { display: flex; justify-content: space-between; margin: 15px 0; border-bottom: 1px solid #004400; padding-bottom: 5px; }
        .profit { font-size: 2.5rem; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #00ff00; }
        button { width: 100%; padding: 15px; margin: 5px 0; font-weight: bold; cursor: pointer; font-family: 'Courier New'; transition: 0.3s; }
        #strike-btn { background: #111; color: #333; border: 1px solid #333; }
        #strike-btn.active { background: #00ff00; color: #000; border: none; cursor: pointer; box-shadow: 0 0 15px #00ff00; }
        #sync-btn { background: #004400; color: #00ff00; border: 1px solid #00ff00; font-size: 0.7rem; }
        #status { font-size: 0.7rem; color: #888; margin-top: 20px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="terminal">
        <h2 style="margin-top:0;">BASE_CORE_OS v2.2</h2>
        <div class="data-line"><span>UNI_V3_PRICE:</span> <span id="uni-val">...</span></div>
        <div class="data-line"><span>AERO_PRICE:</span> <span id="aero-val">...</span></div>
        <div id="spread" class="profit">$0.00</div>
        
        <button id="strike-btn" disabled>BYPASS_SYNCING...</button>
        <button id="sync-btn">MANUAL_RECONNECT</button>
        
        <p id="status">INIT_CHECKSUM_BYPASS...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <script>
        // 1. SECURE NODE CONFIG
        const RPC = "https://mainnet.base.org";
        const provider = new ethers.providers.JsonRpcProvider(RPC);

        // 2. CHECKSUM BYPASS LOGIC (Forces library to auto-correct the addresses)
        const WETH = ethers.utils.getAddress("0x4200000000000000000000000000000000000006".toLowerCase());
        const USDC = ethers.utils.getAddress("0x833589fcd6edb6e08f4c7c32d4f71b54bda02913".toLowerCase());
        const UNI_POOL = ethers.utils.getAddress("0xd0b53d9277642d2a2b174886eba035501dc1d19e".toLowerCase()); 
        const AERO_ROUTER = ethers.utils.getAddress("0xcf77a3ba9a5ca399af7367531ed00ba853860d98".toLowerCase());
        const CONTRACT = ethers.utils.getAddress("0xa94f006639da96911b042ef9461f08bae58e9ba4".toLowerCase());

        async function update() {
            try {
                document.getElementById("status").innerText = "CORE_SYNC_ACTIVE...";
                
                // Uniswap Fetch
                const pool = new ethers.Contract(UNI_POOL, ["function slot0() view returns (uint160, int24, uint16, uint16, uint16, uint8, bool)"], provider);
                const poolData = await pool.slot0();
                
                const ratio = BigInt(poolData[0]) * BigInt(poolData[0]);
                const shift = BigInt(2)**BigInt(192);
                const uPrice = (Number(ratio * BigInt(1e12) / shift) / 1e6).toFixed(2);
                document.getElementById("uni-val").innerText = "$" + uPrice;

                // Aerodrome Fetch
                const router = new ethers.Contract(AERO_ROUTER, ["function getAmountOut(uint, address, address) view returns (uint, bool)"], provider);
                const aeroData = await router.getAmountOut(ethers.utils.parseEther("1"), WETH, USDC);
                const aPrice = (Number(aeroData[0]) / 1e6).toFixed(2);
                document.getElementById("aero-val").innerText = "$" + aPrice;

                // Spread Math
                const diff = (parseFloat(aPrice) - parseFloat(uPrice)).toFixed(2);
                document.getElementById("spread").innerText = (diff > 0 ? "+" : "") + "$" + diff;
                
                const btn = document.getElementById("strike-btn");
                btn.innerText = "WAITING_FOR_SIGNAL";
                btn.disabled = false;
                btn.classList.add("active");
                document.getElementById("status").innerText = "STATUS_ONLINE_BYPASS_SUCCESS";

            } catch (err) {
                console.error("CRITICAL_ERR:", err);
                document.getElementById("status").innerText = "CONNECTION_LAG_RETRYING...";
            }
        }

        async function strike() {
            if (!window.ethereum) return alert("MetaMask Needed!");
            const wallet = new ethers.providers.Web3Provider(window.ethereum);
            await wallet.send("eth_requestAccounts", []);
            const signer = wallet.getSigner();
            const bot = new ethers.Contract(CONTRACT, ["function strike(uint256) external"], signer);
            
            try {
                const tx = await bot.strike(ethers.utils.parseEther("0.01"), { gasLimit: 500000 });
                document.getElementById("status").innerText = "TX_PENDING...";
                await tx.wait();
                document.getElementById("status").innerText = "TX_SUCCESS";
            } catch (e) { document.getElementById("status").innerText = "TX_REJECTED"; }
        }

        document.getElementById("sync-btn").addEventListener("click", update);
        document.getElementById("strike-btn").addEventListener("click", strike);
        
        update();
        setInterval(update, 12000); 
    </script>
</body>
</html>
