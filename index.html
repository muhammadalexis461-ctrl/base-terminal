<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELB 461 | CSP-HARDENED v3.2</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding-top: 30px; }
        .terminal { border: 2px solid #00ff00; background: #000; padding: 30px; margin: 20px auto; width: 480px; box-shadow: 0 0 20px #00ff00; }
        .data-line { display: flex; justify-content: space-between; margin: 15px 0; border-bottom: 1px solid #004400; padding-bottom: 5px; }
        .profit { font-size: 2.5rem; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #00ff00; }
        #status { font-size: 0.8rem; color: #ff00ff; margin-top: 20px; text-transform: uppercase; font-weight: bold; }
        .log-box { height: 120px; background: #111; border: 1px solid #333; overflow-y: scroll; font-size: 0.7rem; text-align: left; padding: 10px; margin-top: 10px; color: #00ff00; }
    </style>
</head>
<body>

    <div class="terminal">
        <h2 style="margin:0;">ELB_461_SECURE_CORE</h2>
        <div class="data-line"><span>UNISWAP_V3:</span> <span id="uni-val">...</span></div>
        <div class="data-line"><span>AERODROME:</span> <span id="aero-val">...</span></div>
        <div id="spread" class="profit">$0.00</div>
        
        <div id="status">INITIALIZING_SANDBOX...</div>
        <div class="log-box" id="logs">CSP_POLICY_ENFORCED...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <script>
        // Use externalized configuration to avoid 'unsafe-inline' triggers
        const CONFIG = {
            RPCs: ["https://1rpc.io/base", "https://base.meowrpc.com"],
            WETH: "0x4200000000000000000000000000000000000006",
            USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
            UNI: "0xd0b53D9277642d2a2b174886eba035501dc1D19e",
            AERO_R: "0xcF77a3Ba9A5ca399AF7367531ED00Ba853860D98",
            AERO_F: "0x420DD3807E0e10597d288A479AD529dcEEFE731B",
            BOT: "0xa94f006639da96911B042ef9461F08Bae58e9bA4"
        };

        let currentRpc = 0;

        function log(m) {
            const b = document.getElementById("logs");
            b.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        async function strike(diff) {
            if (!window.ethereum) return log("METAMASK_NOT_FOUND");
            try {
                const p = new ethers.providers.Web3Provider(window.ethereum);
                const s = p.getSigner();
                const c = new ethers.Contract(CONFIG.BOT, ["function strike(uint256) external"], s);
                const tx = await c.strike(ethers.utils.parseEther("0.01"), { gasLimit: 1000000 });
                log("STRIKE_SENT: " + tx.hash.slice(0,10));
                await tx.wait();
                log("STRIKE_SUCCESS");
            } catch (e) { log("STRIKE_ABORTED"); }
        }

        // ASYNC LOOP: The CSP-safe way to run 24/7 without eval()
        async function start() {
            log("BOOTING_ELB_461_SYSTEM");
            
            while (true) {
                const provider = new ethers.providers.JsonRpcProvider(CONFIG.RPCs[currentRpc]);
                
                try {
                    const uni = new ethers.Contract(CONFIG.UNI, ["function slot0() view returns (uint160, int24, uint16, uint16, uint16, uint8, bool)"], provider);
                    const aero = new ethers.Contract(CONFIG.AERO_R, ["function getAmountOut(uint, address, address, address) view returns (uint, bool)"], provider);

                    const [uD, aD] = await Promise.all([
                        uni.slot0(),
                        aero.getAmountOut(ethers.utils.parseEther("1"), CONFIG.WETH, CONFIG.USDC, CONFIG.AERO_F)
                    ]);

                    const uP = (Number((BigInt(uD[0])**2n * 1000000000000n) / (2n**192n)) / 1e6);
                    const aP = (Number(aD[0]) / 1e6);
                    const diff = (aP - uP).toFixed(2);

                    document.getElementById("uni-val").innerText = "$" + uP.toFixed(2);
                    document.getElementById("aero-val").innerText = "$" + aP.toFixed(2);
                    document.getElementById("spread").innerText = (diff > 0 ? "+" : "-") + "$" + Math.abs(diff);
                    document.getElementById("status").innerText = "ELB_SCANNER_LIVE";

                    if (parseFloat(diff) > 0.50) await strike(diff);

                } catch (e) {
                    currentRpc = (currentRpc + 1) % CONFIG.RPCs.length;
                    log("RPC_FAIL: ROTATING_ORIGIN");
                }
                
                // Pure Promise Delay - Bypasses CSP 'unsafe-eval'
                await new Promise(r => setTimeout(r, 4000));
            }
        }

        // Use addEventListener instead of onclick (Document-recommended practice)
        window.addEventListener('load', start);
    </script>
</body>
</html>
