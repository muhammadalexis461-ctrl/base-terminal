<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ARB_V3 | BASE MAINNET | USDC</title>
    <style>
        :root {
            --green: #00ff41; --dim-green: #00aa28; --yellow: #ffe600; --red: #ff3c3c;
            --bg: #050505; --surface: #0a0a0a; --border: #1a2e1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--green);
            font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center;
            padding: 24px 12px; min-height: 100vh;
        }
        h1 { font-size: 1.1rem; letter-spacing: 0.15em; margin-bottom: 6px; text-shadow: 0 0 8px var(--green); }
        .subtitle { font-size: 0.65rem; color: var(--dim-green); letter-spacing: 0.2em; margin-bottom: 20px; }
        .network-badge { width: 100%; max-width: 720px; text-align: center; font-size: 0.7rem; padding: 6px 12px; margin-bottom: 14px; border: 1px solid var(--border); background: var(--surface); }
        #network-status.ok { color: var(--green); }
        .profit-display { border: 1px solid var(--border); background: var(--surface); padding: 20px; text-align: center; margin-bottom: 16px; width: 100%; max-width: 720px; }
        .profit-amount { font-size: 3rem; font-weight: bold; color: var(--green); text-shadow: 0 0 16px var(--green); }
        .pool-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; max-width: 720px; margin-bottom: 16px; }
        .pool-card { border: 1px solid var(--border); background: var(--surface); padding: 12px; text-align: center; font-size: 0.7rem; }
        .log-box { width: 100%; max-width: 720px; height: 160px; background: #080808; border: 1px solid var(--border); overflow-y: scroll; font-size: 0.65rem; padding: 10px; color: var(--dim-green); margin-bottom: 16px; }
        .log-entry.error { color: var(--red); }
        .log-entry.success { color: var(--green); }
        #manual-strike-btn { width: 100%; max-width: 720px; padding: 14px; background: #0a1a0a; color: var(--yellow); border: 2px solid var(--yellow); cursor: pointer; font-family: inherit; font-weight: bold; }
        #manual-strike-btn:disabled { opacity: 0.3; }
    </style>
</head>
<body>
    <h1>BASE_MAINNET ARB_BOT V3.0</h1>
    <p class="subtitle">UNI &harr; AERO &harr; cbETH | USDC FLASH LOAN</p>

    <div class="network-badge">
        NETWORK: <span id="network-status">CHECKING...</span> | WALLET: <span id="wallet-addr">NOT_CONNECTED</span>
    </div>

    <div class="profit-display">
        <div class="profit-amount" id="spread-display">$0.0000</div>
        <div id="best-route" style="font-size: 0.8rem; margin-top: 10px;">SCANNING...</div>
    </div>

    <div class="pool-grid">
        <div class="pool-card"><div>UNI V3</div><div id="price-uni">...</div></div>
        <div class="pool-card"><div>AERODROME</div><div id="price-aero">...</div></div>
        <div class="pool-card"><div>cbETH/WETH</div><div id="price-cbeth">...</div></div>
    </div>

    <div class="log-box" id="logs"></div>
    <button id="manual-strike-btn" disabled>CONNECT WALLET TO START</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
    <script>
    "use strict";

    const CONFIG = {
        RPCs: ["https://mainnet.base.org", "https://base.llamarpc.com"],
        WETH: "0x4200000000000000000000000000000000000006",
        USDC: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
        CBETH: "0x2Ae3F1Ec7F1F5012CFEab0185bfc7aa3cf0DEc22",
        UNI_POOL: "0xd0b53D9277642d899DF5C87A3966A349A798F224",
        AERO_FACTORY: "0x420DD381b31aEf6683db6B902084cB0FFECe40Da", // V1 Factory
        BOT_CONTRACT: "0xF552e4fFc01c8dD3fDba4623e54bB9cf1DDE8B70",
        LOAN_AMOUNT: 3000
    };

    const ABI = [
        "function slot0() view returns (uint160 sqrtPriceX96, int24 tick, uint16, uint16, uint16, uint8, bool)",
        "function getReserves() view returns (uint256 reserve0, uint256 reserve1, uint32)",
        "function getPair(address,address,bool) view returns (address)",
        "function token0() view returns (address)"
    ];

    let aeroPool = null;
    let provider = new ethers.JsonRpcProvider(CONFIG.RPCs[0]);

    function log(msg, type = "info") {
        const box = document.getElementById("logs");
        const div = document.createElement("div");
        div.className = `log-entry ${type}`;
        div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    // Corrected Price Calculation for Uniswap V3 (USDC/WETH)
    function decodeUniPrice(sqrtX96) {
        const n = BigInt(sqrtX96);
        const Q96 = 2n ** 96n;
        // (n^2 / Q96^2) * (10^18 / 10^6) -> Price of WETH in USDC
        return Number((n * n * 10n**12n) / (Q96 * Q96));
    }

    async function getAeroPool(provider) {
        if (aeroPool) return aeroPool;
        const factory = new ethers.Contract(CONFIG.AERO_FACTORY, ["function getPair(address,address,bool) view returns (address)"], provider);
        try {
            // USDC/WETH on Aerodrome is usually Volatile (false)
            const addr = await factory.getPair(CONFIG.USDC, CONFIG.WETH, false);
            if (addr !== ethers.ZeroAddress) {
                aeroPool = addr;
                log(`Aero Pool Found: ${addr}`, "success");
                return addr;
            }
        } catch (e) { log("Aero Pool discovery failed", "error"); }
        return null;
    }

    async function scan() {
        try {
            const uniContract = new ethers.Contract(CONFIG.UNI_POOL, ABI, provider);
            const slot = await uniContract.slot0();
            const priceUni = decodeUniPrice(slot.sqrtPriceX96);
            document.getElementById("price-uni").textContent = `$${priceUni.toFixed(2)}`;

            const poolAddr = await getAeroPool(provider);
            if (poolAddr) {
                const aeroContract = new ethers.Contract(poolAddr, ABI, provider);
                const [res, t0] = await Promise.all([aeroContract.getReserves(), aeroContract.token0()]);
                const isUsdc0 = t0.toLowerCase() === CONFIG.USDC.toLowerCase();
                const priceAero = isUsdc0 ? Number(res[0] * 10n**12n / res[1]) : Number(res[1] * 10n**12n / res[0]);
                document.getElementById("price-aero").textContent = `$${priceAero.toFixed(2)}`;
                
                const spread = Math.abs(priceUni - priceAero);
                document.getElementById("spread-display").textContent = `$${spread.toFixed(4)}`;
            }
        } catch (e) {
            log(`Scan Error: ${e.message.slice(0, 50)}`, "error");
        }
        setTimeout(scan, 3000);
    }

    window.onload = () => {
        log("Bot Initialized. Waiting for scan...", "info");
        scan();
        if (window.ethereum) {
            document.getElementById("manual-strike-btn").disabled = false;
            document.getElementById("manual-strike-btn").textContent = "▶ START MONITORING (WALLET READY)";
        }
    };
    </script>
</body>
</html>
