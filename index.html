<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELB 461 | ONE-WAY STABLE</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding-top: 30px; }
        .terminal { border: 2px solid #00ff00; background: #000; padding: 30px; margin: 20px auto; width: 480px; box-shadow: 0 0 20px #00ff00; box-sizing: border-box; }
        .data-line { display: flex; justify-content: space-between; margin: 15px 0; border-bottom: 1px solid #004400; padding-bottom: 5px; }
        .profit { font-size: 2.5rem; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #00ff00; }
        #status { font-size: 0.8rem; color: #ff00ff; margin-top: 20px; text-transform: uppercase; font-weight: bold; }
        .log-box { height: 120px; background: #111; border: 1px solid #333; overflow-y: scroll; font-size: 0.7rem; text-align: left; padding: 10px; margin-top: 10px; color: #00ff00; }
    </style>
</head>
<body>
    <div class="terminal">
        <h2 style="margin:0;">ELB_461_ONE_WAY_v3.5</h2>
        <div class="data-line"><span>UNI_V3 (0.05%):</span> <span id="uni-005">...</span></div>
        <div class="data-line"><span>UNI_V3 (0.3%):</span>  <span id="uni-03">...</span></div>
        <div id="spread" class="profit">$0.00</div>
        <div id="status">INIT_SYSTEM...</div>
        <div class="log-box" id="logs">STABILITY_MODE_ACTIVE...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>

    <script>
        const CONFIG = {
            RPCs: ["https://mainnet.base.org", "https://base.llamarpc.com"],
            UNI_POOL_005: "0xd0b53D9277642d899DF5C87A3966A349A798F224",
            UNI_POOL_03:  "0x6c561B446416E1A00E8E93E221854d6eA4171372",
            BOT: "0x700d70d8d1D4833BCF882340E6b005B14FE542D4" // Double check this address
        };

        const SLOT0_ABI = ["function slot0() view returns (uint160 sqrtPriceX96, int24 tick, uint16, uint16, uint16, uint8, bool)"];
        let currentRpc = 0;

        function log(m) {
            const b = document.getElementById("logs");
            b.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`;
            b.scrollTop = b.scrollHeight;
        }

        async function strike(diff) {
            if (!window.ethereum) return log("ERR: NO_METAMASK");
            try {
                const p = new ethers.BrowserProvider(window.ethereum);
                const s = await p.getSigner();
                const c = new ethers.Contract(CONFIG.BOT, ["function strike(uint256) external"], s);
                
                log(`STRIKING_GAP: +$${diff.toFixed(2)}`);
                // Borrowing 0.1 ETH to avoid high slippage reverts
                const tx = await c.strike(ethers.parseEther("0.1"), { gasLimit: 1200000 });
                log("TX_SENT: " + tx.hash.slice(0,10));
                await tx.wait();
                log("STRIKE_CONFIRMED");
            } catch (e) {
                log("STRIKE_BLOCKED: Profit Margin Too Thin");
            }
        }

        async function start() {
            while (true) {
                try {
                    const provider = new ethers.JsonRpcProvider(CONFIG.RPCs[currentRpc]);
                    const p1 = new ethers.Contract(CONFIG.UNI_POOL_005, SLOT0_ABI, provider);
                    const p2 = new ethers.Contract(CONFIG.UNI_POOL_03, SLOT0_ABI, provider);

                    // Fetch both prices with a timeout
                    const [s1, s2] = await Promise.race([
                        Promise.all([p1.slot0(), p2.slot0()]),
                        new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 4000))
                    ]);

                    const price005 = (Number(s1.sqrtPriceX96) / (2**96))**2 * 1e12;
                    const price03 = (Number(s2.slot0 ? s2.slot0.sqrtPriceX96 : s2.sqrtPriceX96) / (2**96))**2 * 1e12;
                    const diff = price03 - price005;

                    document.getElementById("uni-005").innerText = "$" + price005.toFixed(2);
                    document.getElementById("uni-03").innerText = "$" + price03.toFixed(2);
                    document.getElementById("spread").innerText = (diff >= 0 ? "+" : "-") + "$" + Math.abs(diff).toFixed(2);
                    document.getElementById("status").innerText = "LIVE_SCANNING";

                    // Trigger only if spread is healthy
                    if (diff > 4.50) await strike(diff);

                    await new Promise(r => setTimeout(r, 4000));
                } catch (e) { 
                    currentRpc = (currentRpc + 1) % CONFIG.RPCs.length;
                    document.getElementById("status").innerText = "RECONNECTING...";
                    await new Promise(r => setTimeout(r, 5000)); 
                }
            }
        }
        window.addEventListener('load', start);
    </script>
</body>
</html>
