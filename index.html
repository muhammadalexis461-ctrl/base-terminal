<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ELB 461 | AUTO-STRIKE v3.1</title>
    <style>
        body { background: #050505; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; padding-top: 30px; }
        .terminal { border: 2px solid #00ff00; background: #000; padding: 30px; margin: 20px auto; width: 480px; box-shadow: 0 0 20px #00ff00; }
        .data-line { display: flex; justify-content: space-between; margin: 15px 0; border-bottom: 1px solid #004400; padding-bottom: 5px; }
        .profit { font-size: 2.5rem; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #00ff00; }
        #status { font-size: 0.8rem; color: #ff00ff; margin-top: 20px; text-transform: uppercase; font-weight: bold; }
        .log-box { height: 120px; background: #111; border: 1px solid #333; overflow-y: scroll; font-size: 0.7rem; text-align: left; padding: 10px; margin-top: 10px; color: #00ff00; }
    </style>
</head>
<body>

    <div class="terminal">
        <h2 style="margin:0;">ELB_461_AUTONOMOUS</h2>
        <div class="data-line"><span>UNISWAP_V3:</span> <span id="uni-val">...</span></div>
        <div class="data-line"><span>AERODROME:</span> <span id="aero-val">...</span></div>
        <div id="spread" class="profit">$0.00</div>
        
        <div id="status">SCANNING_FOR_OPPORTUNITY...</div>
        <div class="log-box" id="logs">SYSTEM_BOOT_SEQUENCE_COMPLETE...</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

    <script>
        // 1. ELB 461 CORE CONFIGURATION
        const RPC_URL = "https://1rpc.io/base"; // Faster, more stable than mainnet.base.org
        const provider = new ethers.providers.JsonRpcProvider(RPC_URL);
        
        const PROFIT_THRESHOLD = 0.50; 
        const LOAN_AMOUNT = ethers.utils.parseEther("0.01"); 

        const WETH = "0x4200000000000000000000000000000000000006".toLowerCase();
        const USDC = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913".toLowerCase();
        const UNI_POOL = "0xd0b53D9277642d2a2b174886eba035501dc1D19e".toLowerCase(); 
        const AERO_ROUTER = "0xcF77a3Ba9A5ca399AF7367531ED00Ba853860D98".toLowerCase();
        const AERO_FACTORY = "0x420DD3807E0e10597d288A479AD529dcEEFE731B".toLowerCase();
        const CONTRACT_ADDR = "0xa94f006639da96911B042ef9461F08Bae58e9bA4".toLowerCase();

        function addLog(msg) {
            const box = document.getElementById("logs");
            const time = new Date().toLocaleTimeString();
            box.innerHTML += `<div>[${time}] > ${msg}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        // 2. THE STRIKE LOGIC
        async function executeStrike(diff) {
            if (!window.ethereum) return addLog("CRITICAL: METAMASK_NOT_FOUND");
            
            try {
                const wallet = new ethers.providers.Web3Provider(window.ethereum);
                const signer = wallet.getSigner();
                const bot = new ethers.Contract(CONTRACT_ADDR, ["function strike(uint256) external"], signer);
                
                addLog(`PROFIT_DETECTED: $${diff}. SENDING_TX...`);
                document.getElementById("status").innerText = "FLASH_LOAN_IN_PROGRESS...";
                
                // Gas Limit increased for Base Flashblocks compatibility
                const tx = await bot.strike(LOAN_AMOUNT, { gasLimit: 1000000 });
                addLog(`TX_BROADCAST: ${tx.hash.substring(0,12)}...`);
                
                await tx.wait();
                addLog("STRIKE_CONFIRMED. ARBITRAGE_SUCCESS.");
                document.getElementById("status").innerText = "OPPORTUNITY_LOCKED";
            } catch (e) {
                addLog("TX_FAILED: Check balance or slippage.");
                console.error(e);
            }
        }

        // 3. THE 24/7 ENGINE (CSP-SECURE)
        async function runScanner() {
            addLog("ELB_461: Starting 24/7 Scanning Loop...");
            
            while (true) {
                try {
                    const pool = new ethers.Contract(UNI_POOL, ["function slot0() view returns (uint160, int24, uint16, uint16, uint16, uint8, bool)"], provider);
                    const router = new ethers.Contract(AERO_ROUTER, ["function getAmountOut(uint, address, address, address) view returns (uint, bool)"], provider);

                    // Fetch both prices simultaneously
                    const [poolData, aeroData] = await Promise.all([
                        pool.slot0(),
                        router.getAmountOut(ethers.utils.parseEther("1"), WETH, USDC, AERO_FACTORY)
                    ]);

                    // Native BigInt Math (Bypasses SES/CSP restrictions)
                    const sqrtPriceX96 = BigInt(poolData[0]);
                    const uPriceNum = (Number((sqrtPriceX96 * sqrtPriceX96 * 1000000000000n) / (2n**192n)) / 1e6);
                    const aPriceNum = (Number(aeroData[0]) / 1e6);
                    
                    const uPrice = uPriceNum.toFixed(2);
                    const aPrice = aPriceNum.toFixed(2);
                    const diff = (aPriceNum - uPriceNum).toFixed(2);

                    // UI Updates
                    document.getElementById("uni-val").innerText = "$" + uPrice;
                    document.getElementById("aero-val").innerText = "$" + aPrice;
                    const spreadEl = document.getElementById("spread");
                    spreadEl.innerText = (diff > 0 ? "+" : "") + "$" + diff;
                    spreadEl.style.color = diff > 0 ? "#00ff00" : "#ff3333";

                    // 4. AUTO-EXECUTION CHECK
                    if (parseFloat(diff) >= PROFIT_THRESHOLD) {
                        await executeStrike(diff);
                    } else {
                        document.getElementById("status").innerText = "MONITORING_SPREAD...";
                    }

                } catch (err) {
                    // This catches the '0x' or 'revert' error silently and retries
                    document.getElementById("status").innerText = "RPC_RECONNECTING...";
                }
                
                // 3 second delay to keep RPC healthy
                await new Promise(resolve => setTimeout(resolve, 3000));
            }
        }

        // Initial Boot
        window.addEventListener('load', runScanner);
    </script>
</body>
</html>
